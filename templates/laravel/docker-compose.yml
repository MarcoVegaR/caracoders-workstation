services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    volumes:
      - ./:/var/www/html
      - composer-cache:/home/app/.composer/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [app]

  nginx:
    image: ${NGINX_IMAGE:-nginx:1.27-alpine@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10}
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [app]
    networks: [app]

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine@sha256:dc17045ccfd343b49600570ea734b9c4991cf1c3f3302e67df51e3b402dd55c4}
    environment:
      POSTGRES_DB: ${DB_DATABASE:-app}
      POSTGRES_USER: ${DB_USERNAME:-app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-app}
    ports:
      - "127.0.0.1:${DB_FORWARD_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-app} -d ${DB_DATABASE:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [app]

  redis:
    image: ${REDIS_IMAGE:-redis:7.4-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99}
    ports:
      - "127.0.0.1:${REDIS_FORWARD_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks: [app]

  mailpit:
    image: ${MAILPIT_IMAGE:-axllent/mailpit:v1.21.8@sha256:81370195cd4a0eab9604d17c2617a7525b0486f9365555253b6c5376c6350f1a}
    ports:
      - "127.0.0.1:${MAILPIT_UI_PORT:-8025}:8025"
      - "127.0.0.1:${MAILPIT_SMTP_PORT:-1025}:1025"
    networks: [app]

volumes:
  postgres-data:
  redis-data:
  composer-cache:

networks:
  app:
    driver: bridge
